<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

    <div id="wallpaper-layer"></div>
    <div id="bookmarks-bar"></div>

    <div class="clock-card">
        <div id="clock"></div>

        <div id="date"></div>

        <div class="divider"></div>

        <div id="weather">
            <svg id="weather-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"></svg>
            <span id="weather-temp">--°C</span>
            <span class="weather-sep"> | </span>
            <span id="weather-location">--</span>
        </div>
    </div>

    <button id="wallpaper-btn" title="Change wallpaper">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
            <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
        </svg>
    </button>
    <input type="file" id="wallpaper-input" accept="image/*">

    <script src="newtab.js"></script>

</body>
</html>
